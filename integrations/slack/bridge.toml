[integration]
name        = "slack"
description = "Slack messaging via Bolt framework (WebSocket)"
type        = "bridge"

[bridge]
runtime     = "node"
entry       = "bridge.js"
transport   = "stdio"
auto_start  = true
restart_on_crash = true
health_check_interval_seconds = 30
max_restart_attempts = 5

[bridge.incoming]
message_field = "text"
sender_field  = "from"
timestamp_field = "timestamp"

[bridge.outgoing]
message_field = "text"
recipient_field = "channel"

[bridge.lifecycle]
init_command      = '{"type":"init"}'
shutdown_command   = '{"type":"shutdown"}'
health_command     = '{"type":"ping"}'
health_response    = '{"type":"pong"}'

[credentials]
vault_service = "slack"
env_vars      = ["SLACK_BOT_TOKEN", "SLACK_APP_TOKEN"]
