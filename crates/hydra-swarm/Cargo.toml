[package]
name = "hydra-swarm"
version = "0.1.0"
edition = "2021"
description = "Collective intelligence — emergence, consensus, swarm health."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-fleet        = { path = "../hydra-fleet" }
hydra-trust        = { path = "../hydra-trust" }

serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "1"
uuid           = { version = "1", features = ["v4"] }
chrono         = { version = "0.4", features = ["serde"] }

[[bin]]
name = "swarm_test_harness"
path = "src/bin/test_harness.rs"
