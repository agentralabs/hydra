[package]
name = "hydra-memory"
version = "0.1.0"
edition = "2021"
description = "Hydra's soul — 20-year verbatim memory backed by AgenticMemory."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-animus       = { path = "../hydra-animus" }
hydra-temporal     = { path = "../hydra-temporal" }
agentic-memory     = { path = "../../../agentic-memory/crates/agentic-memory" }

serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "2"
uuid           = { version = "1", features = ["v4"] }
chrono         = { version = "0.4", features = ["serde"] }
sha2           = "0.10"
hex            = "0.4"
tokio          = { version = "1", features = ["full"] }
tracing        = "0.1"
dirs           = "5"

[dev-dependencies]
tokio          = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile       = "3"

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
