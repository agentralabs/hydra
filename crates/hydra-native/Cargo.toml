[package]
name = "hydra-native"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Core engine library for Hydra — cognitive loop, sisters, intent router, self-repair"
# ┌──────────────────────────────────────────────────────────────────┐
# │  THIS IS A LIBRARY CRATE — NOT THE DESKTOP APP.                │
# │  The desktop binary lives at: crates/hydra-desktop/             │
# │  Run desktop with: cargo run --bin hydra-desktop                │
# │  DO NOT add [[bin]] targets here. DO NOT create main.rs here.   │
# └──────────────────────────────────────────────────────────────────┘
autobins = false

[features]
default = []
# Enable actual desktop rendering (requires system webkit)
desktop = ["dep:dioxus"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
hydra-model = { workspace = true }
hydra-autonomy = { workspace = true }
hydra-core = { workspace = true }
hydra-gate = { workspace = true }
hydra-runtime = { workspace = true }
hydra-db = { workspace = true }
hydra-inventions = { workspace = true }
hydra-pulse = { workspace = true }
hydra-federation = { workspace = true }
hydra-collab = { workspace = true }

# Desktop rendering (optional — tests run without it)
dioxus = { version = "0.6", features = ["desktop"], optional = true }

[dev-dependencies]
tokio-test = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = "3"
