[package]
name = "hydra-transform"
version = "0.1.0"
edition = "2021"
description = "Any data, any format, meaning preserved."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-animus       = { path = "../hydra-animus" }
hydra-axiom        = { path = "../hydra-axiom" }
hydra-executor     = { path = "../hydra-executor" }

serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
uuid        = { version = "1", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }

[[bin]]
name = "transform_test_harness"
path = "src/bin/test_harness.rs"
