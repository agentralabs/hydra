[package]
name = "hydra-desktop"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "hydra-desktop"
path = "src/main.rs"

[dependencies]
dioxus = { version = "0.6", features = ["desktop"] }
tokio = { version = "1", features = ["full"] }
hydra-native = { path = "../hydra-native", features = ["desktop"] }
cpal = "0.15"
reqwest = { version = "0.12", features = ["json", "multipart", "rustls-tls"] }
serde_json = "1.0"
