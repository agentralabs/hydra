[package]
name = "hydra-generative"
version = "0.1.0"
edition = "2021"
description = "Capability synthesis — generating new capabilities from axiom primitives."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-axiom        = { path = "../hydra-axiom" }
hydra-genome       = { path = "../hydra-genome" }

serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
uuid        = { version = "1", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }

[[bin]]
name = "generative_test_harness"
path = "src/bin/test_harness.rs"
