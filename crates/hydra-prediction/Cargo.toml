[package]
name = "hydra-prediction"
version = "0.1.0"
edition = "2021"
description = "Predictive staging — Hydra prepares before you ask."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-animus       = { path = "../hydra-animus" }
hydra-memory       = { path = "../hydra-memory" }
hydra-belief       = { path = "../hydra-belief" }
hydra-axiom        = { path = "../hydra-axiom" }

serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "2"
uuid           = { version = "1", features = ["v4"] }
chrono         = { version = "0.4", features = ["serde"] }

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
