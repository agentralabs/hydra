[package]
name = "hydra-resurrection"
version = "0.1.0"
edition = "2021"
description = "Continuous delta-state serialization — Hydra never starts cold."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }

serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "1"
uuid           = { version = "1", features = ["v4"] }
chrono         = { version = "0.4", features = ["serde"] }
sha2           = "0.10"
hex            = "0.4"
tracing        = "0.1"

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "resurrection_test_harness"
path = "src/bin/test_harness.rs"
