[package]
name = "hydra-morphic"
version = "0.1.0"
edition = "2021"
description = "Morphic identity — Hydra's continuous, unforgeable identity signature."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-reflexive    = { path = "../hydra-reflexive" }

serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "1"
uuid        = { version = "1", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }
sha2        = "0.10"
hex         = "0.4"

[dev-dependencies]
proptest = "1"

[[bin]]
name = "morphic_test_harness"
path = "src/bin/test_harness.rs"
