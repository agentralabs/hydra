[package]
name = "hydra-federation"
version = "0.1.0"
edition = "2021"
description = "Peer discovery and trust negotiation — Hydra talks to other Hydras."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution  = { path = "../hydra-constitution" }
hydra-trust         = { path = "../hydra-trust" }
hydra-exchange      = { path = "../hydra-exchange" }

serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "1"
uuid       = { version = "1", features = ["v4"] }
chrono     = { version = "0.4", features = ["serde"] }
sha2       = "0.10"
hex        = "0.4"

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
