[package]
name = "hydra-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "HTTP/SSE server for agentic-hydra: JSON-RPC 2.0, SSE events, health check"

[features]
default = []

[[bin]]
name = "hydra-server"
path = "src/main.rs"

[dependencies]
hydra-core = { workspace = true }
hydra-runtime = { workspace = true }
hydra-model = { workspace = true }
hydra-db = { workspace = true }
hydra-kernel = { workspace = true }
hydra-ledger = { workspace = true }
hydra-native = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
reqwest = { workspace = true }
tempfile = "3.10"
