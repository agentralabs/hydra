[package]
name = "hydra-swarm-browser"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Distributed multi-agent web intelligence. Spawn N browser workers simultaneously."

[dependencies]
hydra-browser      = { path = "../hydra-browser" }
hydra-semantic-nav = { path = "../hydra-semantic-nav" }
hydra-web          = { path = "../hydra-web" }
hydra-fleet        = { path = "../hydra-fleet" }
hydra-swarm        = { path = "../hydra-swarm" }
hydra-genome       = { path = "../hydra-genome" }
hydra-trust        = { path = "../hydra-trust" }

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
reqwest = { version = "0.12", features = ["blocking", "json"] }

[[bin]]
name = "swarm_test"
path = "src/bin/swarm_test.rs"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
