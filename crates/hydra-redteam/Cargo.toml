[package]
name = "hydra-redteam"
version = "0.1.0"
edition = "2021"
description = "Proactive adversarial simulation — what would an attacker do?"
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution  = { path = "../hydra-constitution" }
hydra-adversary     = { path = "../hydra-adversary" }
hydra-antifragile   = { path = "../hydra-antifragile" }
hydra-axiom         = { path = "../hydra-axiom" }

hydra-pattern       = { path = "../hydra-pattern" }

serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "1"
uuid       = { version = "1", features = ["v4"] }
chrono     = { version = "0.4", features = ["serde"] }

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
