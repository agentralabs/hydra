[package]
name = "hydra-reach-extended"
version = "0.1.0"
edition = "2021"
description = "External system connectivity — Hydra reaches any target."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution  = { path = "../hydra-constitution" }
hydra-executor      = { path = "../hydra-executor" }
hydra-protocol      = { path = "../hydra-protocol" }
hydra-cartography   = { path = "../hydra-cartography" }
hydra-genome        = { path = "../hydra-genome" }
hydra-antifragile   = { path = "../hydra-antifragile" }

serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "2"
uuid       = { version = "1", features = ["v4"] }
chrono     = { version = "0.4", features = ["serde"] }

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
