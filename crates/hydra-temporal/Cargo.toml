[package]
name = "hydra-temporal"
version = "0.1.0"
edition = "2021"
description = "Time as a first-class constraint — the structural foundation of Hydra memory."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-animus       = { path = "../hydra-animus" }

serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "1"
uuid           = { version = "1", features = ["v4"] }
chrono         = { version = "0.4", features = ["serde"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
