[package]
name = "hydra-persona"
version = "0.1.0"
edition = "2021"
description = "Persona blending and voice system for Hydra."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-reflexive    = { path = "../hydra-reflexive" }
hydra-morphic      = { path = "../hydra-morphic" }

serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "1"
uuid        = { version = "1", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }

[dev-dependencies]
proptest = "1"

[[bin]]
name = "persona_test_harness"
path = "src/bin/test_harness.rs"
