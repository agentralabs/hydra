[package]
name = "hydra-protocol"
version = "0.1.0"
edition = "2021"
description = "Any protocol. Hydra discovers it, adapts to it, reaches it."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution  = { path = "../hydra-constitution" }
hydra-cartography   = { path = "../hydra-cartography" }
hydra-genome        = { path = "../hydra-genome" }
hydra-antifragile   = { path = "../hydra-antifragile" }
hydra-transform     = { path = "../hydra-transform" }
hydra-environment   = { path = "../hydra-environment" }

serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "1"
uuid       = { version = "1", features = ["v4"] }
chrono     = { version = "0.4", features = ["serde"] }

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
