[package]
name = "hydra-pattern"
version = "0.1.0"
edition = "2021"
description = "Deep pattern library — anti-patterns and success patterns at axiom level."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution  = { path = "../hydra-constitution" }
hydra-axiom         = { path = "../hydra-axiom" }
hydra-genome        = { path = "../hydra-genome" }
hydra-synthesis     = { path = "../hydra-synthesis" }
hydra-audit         = { path = "../hydra-audit" }

serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "1"
uuid       = { version = "1", features = ["v4"] }
chrono     = { version = "0.4", features = ["serde"] }

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
