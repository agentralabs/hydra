[package]
name = "hydra-trust"
version = "0.1.0"
edition = "2021"
description = "Trust thermodynamics — the Hamiltonian fleet model."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-animus       = { path = "../hydra-animus" }

serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "1"
uuid           = { version = "1", features = ["v4", "serde"] }
chrono         = { version = "0.4", features = ["serde"] }

[[bin]]
name = "trust_test_harness"
path = "src/bin/test_harness.rs"
