[package]
name = "hydra-tui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Hydra TUI v2 — Claude Code-quality terminal interface"

[[bin]]
name = "hydra-tui"
path = "src/main.rs"

[dependencies]
# TUI framework
ratatui = "0.29"
crossterm = { version = "0.28", features = ["event-stream"] }

# Async runtime
tokio = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# HTTP client (JSON-RPC + SSE)
ureq = "2"

# Date/Time & IDs
chrono = { workspace = true }
uuid = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Syntax highlighting
syntect = "5"

# Markdown rendering
# (we render markdown ourselves using ratatui spans)

[dev-dependencies]
tokio-test = { workspace = true }
