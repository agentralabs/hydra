[package]
name = "hydra-synthesis"
version = "0.1.0"
edition = "2021"
description = "Cross-domain pattern discovery from axiom primitives and genome patterns."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution  = { path = "../hydra-constitution" }
hydra-comprehension = { path = "../hydra-comprehension" }
hydra-reasoning     = { path = "../hydra-reasoning" }
hydra-genome        = { path = "../hydra-genome" }
hydra-axiom         = { path = "../hydra-axiom" }

serde      = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "1"
uuid       = { version = "1", features = ["v4"] }
chrono     = { version = "0.4", features = ["serde"] }

[[bin]]
name = "test_harness"
path = "src/bin/test_harness.rs"
