[package]
name = "hydra-executor"
version = "0.1.0"
edition = "2021"
description = "Universal action engine — receipted execution with approach-cycle rerouting."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution  = { path = "../hydra-constitution" }
hydra-comprehension = { path = "../hydra-comprehension" }
hydra-reasoning     = { path = "../hydra-reasoning" }
hydra-genome        = { path = "../hydra-genome" }
hydra-antifragile   = { path = "../hydra-antifragile" }

toml        = "0.8"
reqwest     = { version = "0.12", features = ["json", "blocking"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
uuid        = { version = "1", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }
sha2        = "0.10"
hex         = "0.4"

[[bin]]
name = "executor_test_harness"
path = "src/bin/test_harness.rs"
