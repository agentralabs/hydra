[package]
name = "hydra-reflexive"
version = "0.1.0"
edition = "2021"
description = "Hydra's self-model and safe self-modification engine."
authors = ["Agentra Labs"]

[dependencies]
hydra-constitution = { path = "../hydra-constitution" }
hydra-animus       = { path = "../hydra-animus" }

serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "1"
uuid        = { version = "1", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }

[dev-dependencies]
proptest = "1"

[[bin]]
name = "reflexive_test_harness"
path = "src/bin/test_harness.rs"
