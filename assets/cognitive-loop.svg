<svg xmlns="http://www.w3.org/2000/svg" width="600" height="140" viewBox="0 0 600 140" fill="none">
  <defs>
    <linearGradient id="clbg" x1="0" y1="0" x2="600" y2="140">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="140" rx="12" fill="url(#clbg)"/>

  <!-- Phase 1: Perceive -->
  <rect x="20" y="40" width="96" height="60" rx="8" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1.5"/>
  <text x="68" y="68" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#c7d2fe" text-anchor="middle">PERCEIVE</text>
  <text x="68" y="84" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">gather input</text>

  <!-- Arrow -->
  <path d="M 120 70 L 136 70" stroke="#6366f1" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: Think -->
  <rect x="140" y="40" width="96" height="60" rx="8" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="188" y="68" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle">THINK</text>
  <text x="188" y="84" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">reason + plan</text>

  <!-- Arrow -->
  <path d="M 240 70 L 256 70" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Phase 3: Decide -->
  <rect x="260" y="40" width="96" height="60" rx="8" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="308" y="68" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#ddd6fe" text-anchor="middle">DECIDE</text>
  <text x="308" y="84" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">pick action</text>

  <!-- Arrow -->
  <path d="M 360 70 L 376 70" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- Phase 4: Act -->
  <rect x="380" y="40" width="96" height="60" rx="8" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
  <text x="428" y="68" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#86efac" text-anchor="middle">ACT</text>
  <text x="428" y="84" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">execute safe</text>

  <!-- Arrow -->
  <path d="M 480 70 L 496 70" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

  <!-- Phase 5: Learn -->
  <rect x="500" y="40" width="80" height="60" rx="8" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="68" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#fde68a" text-anchor="middle">LEARN</text>
  <text x="540" y="84" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">improve</text>

  <!-- Feedback loop arrow -->
  <path d="M 540 100 C 540 125, 68 125, 68 100" stroke="#f59e0b" stroke-width="1" opacity="0.3" fill="none" stroke-dasharray="4 3"/>
  <text x="300" y="130" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.6">feedback loop</text>
</svg>
