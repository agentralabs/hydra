  <circle cx="20" cy="75" r="3.5" fill="#8b5cf6"/>
  <circle cx="100" cy="75" r="6" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="100" cy="75" r="3.5" fill="#8b5cf6"/>
  <circle cx="40" cy="100" r="6" fill="#a78bfa" opacity="0.3"/>
