<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="480">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="2">HYDRA ARCHITECTURE</text>

  <!-- Desktop / CLI Layer -->
  <rect x="300" y="52" width="200" height="40" rx="8" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="77" font-family="system-ui,sans-serif" font-size="13" fill="#c7d2fe" text-anchor="middle">Desktop / CLI</text>

  <!-- Arrow -->
  <line x1="400" y1="92" x2="400" y2="112" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <text x="420" y="106" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">SSE + JSON-RPC</text>

  <!-- Server Layer -->
  <rect x="280" y="112" width="240" height="40" rx="8" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="137" font-family="system-ui,sans-serif" font-size="13" fill="#c7d2fe" text-anchor="middle">hydra-server :7777</text>

  <!-- Three branches -->
  <line x1="320" y1="152" x2="160" y2="182" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="152" x2="400" y2="182" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="152" x2="640" y2="182" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>

  <!-- Cognitive Loop -->
  <rect x="60" y="182" width="200" height="50" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="160" y="203" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Cognitive Loop</text>
  <text x="160" y="221" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">P > T > D > A > L</text>

  <!-- Model Router -->
  <rect x="300" y="182" width="200" height="50" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="203" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Model Router</text>
  <text x="400" y="221" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">Anthropic | OpenAI | Local</text>

  <!-- Execution Gate -->
  <rect x="540" y="182" width="200" height="50" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="640" y="203" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Execution Gate</text>
  <text x="640" y="221" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">6 Security Layers</text>

  <!-- Middle Layer: Skills, Compiler, Inventions, Pulse -->
  <line x1="160" y1="232" x2="160" y2="262" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <rect x="40" y="262" width="120" height="36" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="100" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Skills Fabric</text>

  <rect x="180" y="262" width="120" height="36" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Compiler</text>

  <rect x="320" y="262" width="120" height="36" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Inventions</text>

  <rect x="460" y="262" width="120" height="36" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="520" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Pulse</text>

  <rect x="600" y="262" width="140" height="36" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="670" y="285" font-family="system-ui,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Federation</text>

  <!-- MCP Layer -->
  <line x1="400" y1="298" x2="400" y2="324" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <text x="420" y="316" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">MCP</text>

  <rect x="60" y="324" width="680" height="40" rx="8" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="349" font-family="system-ui,sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">14 Sisters: Memory | Vision | Codebase | Identity | Time | Forge | Evolve | Cognition | Reality | Veritas | Aegis | Rail | ACP | CLI</text>

  <!-- Animus Layer -->
  <line x1="400" y1="364" x2="400" y2="388" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <rect x="250" y="388" width="300" height="36" rx="8" fill="#a78bfa" opacity="0.1" stroke="#a78bfa" stroke-width="1"/>
  <text x="400" y="411" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Animus Prime (AI-Native Language)</text>

  <!-- Bottom: Observability -->
  <rect x="60" y="440" width="680" height="28" rx="6" fill="#334155" opacity="0.4" stroke="#475569" stroke-width="0.5"/>
  <text x="400" y="459" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">Observability: Logs | Metrics | Traces | Exports</text>
</svg>
