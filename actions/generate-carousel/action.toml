# GENERATE CAROUSEL — Create LinkedIn/Instagram carousels from a topic.
# Hydra writes the content. HTML renders the slides. Screenshots produce images.
#
# Output: PNG files ready to upload to any platform.
# No Canva. No Figma. No design tool. Just Hydra.
#
# Prerequisites: Node.js (for Puppeteer screenshot)

[action]
name        = "generate-carousel"
description = "Generate a professional carousel (PNG slides) from a topic"
trigger     = "manual"
approval    = "required"

[action.execute]
type            = "shell"
command         = '''
mkdir -p /tmp/hydra-carousel

# Generate HTML for each slide
cat > /tmp/hydra-carousel/slides.html << 'HTMLEOF'
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .slide {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    page-break-after: always;
  }
  .slide-hook {
    background: linear-gradient(135deg, #c8a96e 0%, #e8c87a 50%, #6ab8d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 56px;
    font-weight: 800;
    text-align: center;
    line-height: 1.3;
  }
  .slide-body {
    color: #e0e0e0;
    font-size: 42px;
    font-weight: 400;
    text-align: center;
    line-height: 1.6;
  }
  .slide-number {
    color: #444;
    font-size: 24px;
    position: absolute;
    bottom: 40px;
    right: 60px;
  }
  .accent { color: #c8a96e; }
  .brand {
    color: #555;
    font-size: 20px;
    position: absolute;
    bottom: 40px;
    left: 60px;
  }
</style>
</head>
<body>
HTMLEOF

echo "Carousel HTML generated at /tmp/hydra-carousel/slides.html"
echo "Content: {topic}"
echo "Slides: {slide_count}"
echo ""
echo "To render to PNG, run:"
echo "  npx puppeteer screenshot /tmp/hydra-carousel/slides.html"
echo "Or open in browser and screenshot manually."
'''
timeout_seconds = 30

[[action.parameters]]
name     = "topic"
type     = "string"
required = true

[[action.parameters]]
name     = "slide_count"
type     = "string"
default  = "10"
