# GENERATE SOCIAL POST — Platform-optimized content from a topic.
# Outputs ready-to-paste text for LinkedIn, Twitter, or Instagram.

[action]
name        = "generate-social-post"
description = "Generate a platform-optimized social media post"
trigger     = "manual"
approval    = "required"

[action.execute]
type            = "shell"
command         = '''
echo "=== GENERATED POST ==="
echo "Platform: {platform}"
echo "Topic: {topic}"
echo "Tone: {tone}"
echo ""
echo "Post content will be generated by the cognitive loop"
echo "using content-creation genome entries for {platform}-specific formatting."
'''
timeout_seconds = 10

[[action.parameters]]
name     = "topic"
type     = "string"
required = true

[[action.parameters]]
name     = "platform"
type     = "string"
required = true

[[action.parameters]]
name     = "tone"
type     = "string"
default  = "professional"
