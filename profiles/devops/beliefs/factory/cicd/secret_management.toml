[[beliefs]]
fact = "Secrets must never be stored in source code, environment files committed to git, or CI/CD pipeline definitions — use a dedicated secrets manager (Vault, AWS Secrets Manager, or equivalent)"
confidence = 0.99
source = "OWASP Secrets Management Cheat Sheet"
action_trigger = "New secret introduced, repository scanned, or CI pipeline modified"
edge_case = "Local development may use .env files if they are gitignored and the onboarding docs explain how to populate them from the secrets manager"
tags = ["cicd", "secrets", "security", "compliance"]

[[beliefs]]
fact = "All secrets must be rotated on a defined cadence — 90 days maximum for API keys and service accounts, 24 hours for short-lived tokens"
confidence = 0.93
source = "CIS Controls v8 — Control 16: Application Software Security"
action_trigger = "Secret rotation schedule review or new credential provisioned"
edge_case = "Third-party API keys with no rotation API require manual rotation; track these separately and push vendors to support programmatic rotation"
tags = ["cicd", "secrets", "rotation", "compliance"]

[[beliefs]]
fact = "Applications must fetch secrets at runtime from the secrets manager — never bake secrets into container images, AMIs, or deployment artifacts"
confidence = 0.97
source = "12-Factor App methodology and container security best practices"
action_trigger = "Container image build process reviewed or new service onboarded"
edge_case = "Init containers or entrypoint scripts that fetch secrets before app start are acceptable; ensure the sidecar/init pattern does not cache secrets to disk"
tags = ["cicd", "secrets", "runtime", "containers"]

[[beliefs]]
fact = "Development and production environments must use completely separate secret stores and credentials — sharing secrets across environments is a critical security violation"
confidence = 0.98
source = "SOC 2 Type II — Logical Access Controls requirement"
action_trigger = "New environment provisioned or access review conducted"
edge_case = "Shared external SaaS services with a single API key require environment-scoped sub-keys or IP allowlisting to isolate access"
tags = ["cicd", "secrets", "environment-isolation", "compliance"]
