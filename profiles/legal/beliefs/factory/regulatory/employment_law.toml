[[beliefs]]
fact = "At-will employment (US default) allows termination without cause but not for illegal reasons — discrimination, retaliation, and violation of public policy are exceptions that create liability"
confidence = 0.93
source = "factory"
action_trigger = "When advising on employee termination in the US"
edge_case = "Montana is the only US state that is not at-will after a probationary period — and many other countries have no at-will concept at all, requiring just cause for dismissal"
tags = ["regulatory", "employment", "at-will"]

[[beliefs]]
fact = "Notice periods for termination vary from zero (US at-will) to months (many EU countries) — failing to provide required notice creates wrongful termination liability"
confidence = 0.91
source = "factory"
action_trigger = "When planning employee terminations in jurisdictions with notice requirements"
edge_case = "Some jurisdictions allow payment in lieu of notice (PILON) — but this must be contractually permitted or statutory, not assumed"
