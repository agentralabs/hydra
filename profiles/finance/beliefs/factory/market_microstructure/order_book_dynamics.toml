[[beliefs]]
fact = "When the bid-ask spread on a large-cap equity widens beyond 3x its 20-day median during regular trading hours, it signals either a pending news event or a market maker pulling liquidity — in either case, aggressive orders in the next 30 seconds face 2-5x normal adverse selection."
confidence = 0.92
source = "Empirical: NYSE TAQ data 2015-2024, confirmed by Biais/Hillion/Spatt 1995 spread decomposition"
action_trigger = "Spread exceeds 3x 20-day median → delay non-urgent orders, flag for manual review, check news feeds"
edge_case = "During index rebalance days (Russell reconstitution, S&P adds/deletes), spreads widen mechanically without adverse information — this signal generates false positives on those dates."
tags = ["microstructure", "spread", "liquidity", "adverse_selection"]

[[beliefs]]
fact = "Iceberg orders (reserve/hidden quantity) account for 15-40% of total depth in liquid US equities. When visible depth at the best bid suddenly replenishes after being consumed without price movement, an iceberg is present — the true support level is 3-8x the visible size."
confidence = 0.88
source = "Empirical: LOBSTER dataset analysis, Tuttle 2013 iceberg detection, prop desk experience 2018-2023"
action_trigger = "Repeated replenishment at same price level detected → adjust size estimates upward 3-8x, treat as strong support/resistance"
edge_case = "Some HFT firms deliberately mimic iceberg replenishment patterns to create false support levels, then pull when a large order arrives. Cross-reference with trade-through frequency to distinguish real from fake."
tags = ["microstructure", "iceberg", "hidden_liquidity", "order_types"]

[[beliefs]]
fact = "Persistent order flow imbalance (buy volume minus sell volume, normalized) exceeding +/- 0.3 over a 5-minute window predicts the next 1-minute return direction with 62-68% accuracy in liquid equities — but only when measured at the trade level, not the quote level."
confidence = 0.85
source = "Cont/Kukanov/Stoikov 2014, confirmed by internal backtests on SPY/QQQ 2019-2024"
action_trigger = "Order flow imbalance > 0.3 sustained for 5 minutes → flag directional bias, adjust execution timing for aligned/opposed orders"
edge_case = "During the last 15 minutes of trading (MOC imbalance period), order flow imbalance is dominated by index fund rebalancing and loses its predictive power for informed trading direction."
tags = ["microstructure", "order_flow", "prediction", "imbalance"]

[[beliefs]]
fact = "Dark pool prints at or near the NBBO midpoint in sizes larger than 10,000 shares, when occurring in clusters of 3+ within 2 minutes, indicate institutional accumulation with 70%+ probability. The stock moves 0.5-2% in the accumulation direction over the next 1-3 trading days."
confidence = 0.82
source = "FINRA ATS data analysis 2020-2024, Zhu 2014 dark pool theory, empirical validation on mid-cap universe"
action_trigger = "Clustered dark pool midpoint prints detected → flag as institutional activity, monitor for continuation, adjust short-term price target"
edge_case = "Portfolio transitions between index funds create dark pool print clusters that look like directional accumulation but are actually matched crosses with no directional intent. Check if both TRF tapes show similar patterns simultaneously."
tags = ["microstructure", "dark_pool", "institutional", "accumulation"]

[[beliefs]]
fact = "When the ratio of cancelled-to-executed orders at a single price level exceeds 20:1 within a 100ms window, and this pattern repeats across 3+ price levels in sequence, it is consistent with spoofing or layering — a manipulative pattern that precedes artificial price moves of 0.1-0.5% and subsequent rapid reversal."
confidence = 0.90
source = "SEC enforcement actions 2015-2024, Dodd-Frank anti-spoofing provision analysis, CME disciplinary cases"
action_trigger = "Cancel-to-trade ratio > 20:1 with sequential price level pattern → generate manipulation alert, preserve order audit trail, flag for compliance review"
edge_case = "Legitimate market makers during volatile periods may exhibit high cancel rates across price levels as they rapidly requote — distinguish by checking if the entity has a registered market maker obligation and whether the pattern is symmetric (both sides) vs one-sided."
tags = ["microstructure", "spoofing", "manipulation", "surveillance"]
