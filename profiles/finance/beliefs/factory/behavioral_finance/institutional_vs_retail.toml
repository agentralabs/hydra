[[beliefs]]
fact = "Unusual options activity — defined as single-name call volume exceeding 3x the 20-day average, concentrated in short-dated (0-14 DTE) out-of-the-money strikes, with open interest increasing (new positions, not closing) — precedes positive stock returns of 3-8% over the next 5 trading days with 62% accuracy. This works because informed traders prefer options for leverage and limited downside, and the options market leads the equity market by hours to days for information-driven moves."
confidence = 0.85
source = "Pan/Poteshman 2006 information in option volume, Johnson/So 2012 option to stock volume ratio, empirical analysis 2018-2024"
action_trigger = "Unusual call activity detected (3x avg volume, short-dated OTM, increasing OI) → flag as potential informed activity, cross-reference with news/events calendar, consider following with a defined-risk options position"
edge_case = "Market makers hedging large block trades can create unusual activity signatures that look like informed trading but are actually mechanical. Check if the unusual activity is concentrated at a single strike (more likely informed) or spread across multiple strikes (more likely hedging/market making)."
tags = ["behavioral", "institutional", "unusual_options", "informed_trading"]

[[beliefs]]
fact = "Dark pool volume as a percentage of total volume (dark pool share) is inversely correlated with information content — when dark pool share rises above 45% of total volume, it indicates institutional investors are avoiding lit exchanges because they have large orders to hide. Conversely, when dark pool share drops below 35%, it indicates institutional flow has moved to lit venues, typically because urgency or information advantage makes stealth less important. The shift from dark to lit is the more actionable signal."
confidence = 0.83
source = "FINRA ATS data, Zhu 2014 dark pool equilibrium, Comerton-Forde/Putnins 2015 dark trading and price discovery"
action_trigger = "Dark pool share drops from >45% to <35% for a specific stock over 5 days → institutional urgency increasing, expect larger price move in the direction of the net dark pool imbalance (available from FINRA with 2-week lag)"
edge_case = "Regulatory changes (SEC proposals on dark pool transparency) can shift the dark/lit ratio for structural rather than informational reasons. Monitor for regulatory announcements that would mechanically alter dark pool usage before interpreting ratio changes as signals."
tags = ["behavioral", "institutional", "dark_pool", "information"]

[[beliefs]]
fact = "Smart money timing — measured by institutional ownership changes in 13F filings combined with short-term price action — shows that institutions are net buyers in the 30 days before positive earnings surprises with 58% accuracy and net sellers before negative surprises with 55% accuracy. This edge is small per trade but persistent and monetizable at scale across a universe of 500+ stocks. The signal is strongest for mid-cap stocks where institutional research coverage creates a genuine information advantage."
confidence = 0.81
source = "13F filing analysis, Bushee/Goodman 2007 institutional ownership changes, Ali/Hwang/Trombley 2000"
action_trigger = "Institutional ownership increase > 2% of float in most recent 13F quarter + stock outperforming sector → flag as potential smart money accumulation, monitor for upcoming earnings catalyst"
edge_case = "13F filings have a 45-day delay (filed within 45 days of quarter end), making the data stale by 1.5-4.5 months. Combine with real-time proxies (dark pool data, unusual options activity) to update the institutional positioning picture between filing dates."
tags = ["behavioral", "institutional", "smart_money", "13f"]
