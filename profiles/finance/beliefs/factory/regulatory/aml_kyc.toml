[[beliefs]]
fact = "Structuring — breaking transactions into amounts below the $10,000 CTR (Currency Transaction Report) threshold — is the most common and most easily detected form of money laundering. A customer making 3+ cash deposits of $8,000-$9,999 within a 7-day period has a 95%+ probability of structuring, even if each individual transaction is below the reporting threshold. Under 31 USC 5324, structuring itself is a federal crime regardless of whether the underlying funds are legal."
confidence = 0.95
source = "FinCEN guidance 2010-2024, BSA/AML examination manual, federal structuring prosecutions database"
action_trigger = "Multiple cash transactions in $8K-$9.99K range within 7 days by same customer → generate alert, file SAR within 30 days regardless of whether the customer provides an explanation, escalate to BSA officer"
edge_case = "Small businesses that routinely deposit daily cash receipts near but below $10K (restaurants, laundromats, convenience stores) create structuring-like patterns that are legitimate. Cross-reference with the business type, historical deposit patterns, and declared revenue to distinguish legitimate deposits from structuring."
tags = ["regulatory", "aml", "structuring", "detection"]

[[beliefs]]
fact = "SAR (Suspicious Activity Report) filing within 30 days of detection is a non-negotiable regulatory requirement under the BSA. Late SAR filing is the single most common BSA/AML enforcement action — it accounts for 60% of FinCEN penalties. The filing itself is protected by safe harbor (no liability for good-faith reporting), but failure to file or late filing has resulted in penalties ranging from $1M to $4B (BNP Paribas 2014, Deutsche Bank 2017, Danske Bank 2022)."
confidence = 0.96
source = "FinCEN enforcement actions database 2010-2024, BSA/AML regulatory framework, 31 USC 5318(g)"
action_trigger = "Suspicious activity detected → start 30-day SAR filing clock immediately, document all investigative steps, do NOT tip off the customer (tipping off is a separate crime under 31 USC 5318(g)(2))"
edge_case = "For ongoing suspicious activity, a continuing SAR must be filed every 90 days until the activity ceases. Many institutions miss the continuing SAR requirement after the initial filing, creating a secondary compliance failure. Set automated 90-day reminders for every open SAR case."
tags = ["regulatory", "aml", "sar", "filing"]

[[beliefs]]
fact = "PEP (Politically Exposed Person) screening must cover not just the customer but their immediate family members and close associates — the 'beneficial ownership' chain. PEPs from high-risk jurisdictions (FATF grey/black list countries) require Enhanced Due Diligence (EDD) including source-of-wealth documentation. The reputational and regulatory cost of a missed PEP is 10-50x the cost of the EDD process, making false negatives far more expensive than false positives."
confidence = 0.93
source = "FATF Recommendation 12, EU 6th Anti-Money Laundering Directive, FinCEN CDD Rule 2018"
action_trigger = "New customer onboarding → screen against PEP databases (World-Check, Dow Jones, OFAC), screen all beneficial owners >25%, re-screen existing customers quarterly against updated PEP lists"
edge_case = "Former PEPs (no longer in office) remain high-risk for 12-24 months after leaving office because the influence and corruption networks persist. Most PEP databases do not automatically declassify former PEPs quickly enough — maintain EDD for at least 18 months after the person leaves their position."
tags = ["regulatory", "aml", "pep", "screening"]

[[beliefs]]
fact = "Transaction monitoring systems generate 95-99% false positive rates — for every genuine suspicious activity alert, there are 50-100 false alarms. This does not mean the monitoring is too sensitive; it means the monitoring is necessary. Reducing false positives by raising thresholds inevitably increases false negatives, which are regulatory violations. The correct approach is to invest in alert triage efficiency (AI-assisted investigation, case management workflow) rather than reducing alert volume."
confidence = 0.91
source = "McKinsey AML cost study 2022, FinCEN Innovation Initiative, industry false positive rate data 2018-2024"
action_trigger = "AML alert generated → triage within 24 hours (risk-score and route to appropriate investigation tier), investigate Tier 1 alerts within 5 business days, resolve or escalate to SAR within 20 days"
edge_case = "Machine learning models that reduce false positives must be validated quarterly against a labeled dataset of known suspicious activity — regulators have penalized institutions whose ML models reduced alerts but missed subsequently confirmed money laundering. Document the model's false negative rate explicitly."
tags = ["regulatory", "aml", "monitoring", "false_positives"]
