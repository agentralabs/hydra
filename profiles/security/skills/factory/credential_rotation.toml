[skill]
name = "credential_rotation"
description = "Rotate compromised or at-risk credentials with minimal service disruption"
trigger_phrases = ["rotate credentials", "compromised credentials", "password reset", "key rotation", "secret compromised"]
agent = "incident_responder"
model = "claude-sonnet-4-6"
timeout_seconds = 240

[[steps]]
name = "identify_affected"
description = "Enumerate all credentials associated with the compromised account or system"
action = "Map the compromised identity to all associated credentials: passwords, API keys, SSH keys, OAuth tokens, service account tokens, certificates. Check secret management systems (Vault, AWS Secrets Manager) for stored credentials linked to the identity. Include credentials that may have been accessed from the compromised system (cached credentials, browser-stored passwords)."
sisters = ["identity", "memory"]

[[steps]]
name = "generate_new"
description = "Generate replacement credentials meeting security policy requirements"
action = "For each credential type: generate new credentials meeting policy requirements (minimum length, complexity, entropy). For API keys and tokens: generate via the service provider's API. For certificates: submit CSR to internal CA. For SSH keys: generate Ed25519 keys. Do NOT reuse any pattern from old credentials."
sisters = ["identity", "contract"]

[[steps]]
name = "distribute_securely"
description = "Deliver new credentials through secure channels to authorized recipients"
action = "Distribute via secure channel appropriate to credential type: secrets manager update for service credentials, encrypted channel for human credentials, automated deployment for infrastructure credentials. Never transmit credentials via email, Slack, or any unencrypted channel. Log distribution recipient and timestamp."
sisters = ["connect", "identity"]

[[steps]]
name = "verify_function"
description = "Confirm new credentials work correctly in all dependent systems"
action = "For each credential: test authentication to dependent systems. Verify service continuity for automated credentials. Confirm human users can authenticate with new credentials. Monitor for authentication failures in the 15 minutes following rotation that may indicate missed dependencies."
sisters = ["aegis", "reality"]

[[steps]]
name = "revoke_old"
description = "Invalidate all old credentials and verify revocation"
action = "Revoke old credentials in this order: (1) tokens and sessions first (immediate threat), (2) API keys, (3) passwords, (4) certificates (add to CRL/OCSP). Verify revocation by attempting authentication with old credentials — must fail. Log revocation timestamp. Monitor for any successful authentication using old credential hashes for 48 hours."
sisters = ["identity", "aegis"]
