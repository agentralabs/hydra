[[beliefs]]
fact = "Exponential smoothing (Holt-Winters) handles seasonal demand well with minimal data — 2-3 years of weekly history is sufficient for stable categories"
confidence = 0.85
source = "factory"
action_trigger = "When generating baseline forecasts for products with clear seasonal patterns"
