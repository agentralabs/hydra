[[beliefs]]
fact = "cargo expand reveals the actual code generated by macros and derives — use it to debug confusing compile errors from proc macros, understand what #[derive] produces, or verify macro hygiene"
confidence = 0.90
source = "factory"
action_trigger = "When a macro-generated error is incomprehensible or when you need to understand what a derive macro produces"
edge_case = "cargo expand outputs the entire expanded file which can be enormous — pipe through rustfmt and use --theme to improve readability, or expand a single function with --item"
tags = ["debugging", "tools", "rust", "macros", "cargo-expand"]

[[beliefs]]
fact = "Python's pdb (and the enhanced ipdb/pudb) allow interactive breakpoint debugging with full REPL access — insert breakpoint() in code or run with python -m pdb to step through execution and inspect state"
confidence = 0.92
source = "factory"
action_trigger = "When a Python bug cannot be diagnosed from logs or print statements alone"
edge_case = "pdb does not work well inside async code or multi-threaded programs — use logging-based debugging or specialized tools like py-spy for profiling concurrent Python"
tags = ["debugging", "tools", "python", "pdb"]

[[beliefs]]
fact = "git bisect automates binary search through commit history to find the exact commit that introduced a regression — provide a known-good and known-bad commit, and it narrows to the culprit in O(log n) steps"
confidence = 0.95
source = "factory"
action_trigger = "When a bug exists now but did not exist at some known previous point, and manual log reading is impractical"
edge_case = "git bisect struggles with non-linear history (merge commits) and requires that every intermediate commit builds and is testable — use git bisect skip for broken commits, and automate with git bisect run <test-script>"
tags = ["debugging", "tools", "git", "bisect"]
