## DATABASES IN PRODUCTION

[[entries]]
situation    = "database query is slow in production"
approach     = "EXPLAIN ANALYZE the query — look for sequential scans on tables with >10K rows — add indexes on columns in WHERE, JOIN, and ORDER BY — composite indexes: put the most selective column first — if the query joins 4+ tables, consider denormalization — N+1 queries are the most common cause of slow APIs: use eager loading or batch queries — measure before and after every change"
confidence   = 0.93
observations = 100000

[[entries]]
situation    = "database migration on a live production system"
approach     = "zero-downtime migration pattern: add new column → backfill data → deploy code that writes to both → verify → drop old column — never rename a column in one step — never add a NOT NULL column without a default — test on a production-sized dataset before deploying — have a rollback plan for every migration — schedule migrations during low-traffic hours"
confidence   = 0.92
observations = 30000

[[entries]]
situation    = "choosing between SQL and NoSQL for a specific use case"
approach     = "SQL when: you have relationships, you need transactions, your schema is well-defined, you need complex queries — NoSQL when: you have document-shaped data, you need horizontal scale, your schema is flexible, you have high write throughput — PostgreSQL covers 90% of use cases — do not choose NoSQL because SQL feels old, choose it because your data model requires it"
confidence   = 0.89
observations = 40000

## PRODUCTION OPERATIONS

[[entries]]
situation    = "deploying to production for the first time"
approach     = "health check endpoint (/health or /ready) before anything else — structured logging with request IDs from day one — error tracking (Sentry, Honeybadger) from day one — uptime monitoring from day one — these four things before the first user touches it — everything else can wait — the first deploy without monitoring is the most dangerous deploy you will ever do"
confidence   = 0.93
observations = 50000

[[entries]]
situation    = "handling a production incident under pressure"
approach     = "mitigate first, investigate second — can you rollback? do it — can you feature-flag it off? do it — communicate to stakeholders: 'we are aware, investigating, ETA in 30 minutes' — open an incident channel, not a thread — one incident commander, everyone else reports to them — after resolution: blameless post-mortem within 48 hours — the process is: detect → mitigate → communicate → investigate → fix → learn"
confidence   = 0.94
observations = 60000

[[entries]]
situation    = "on-call rotation for a production service"
approach     = "page only for user-facing impact, not for internal metrics — every alert needs a runbook (what it means, what to do, who to escalate to) — if an alert pages more than 3 times without action, delete it — on-call should not be a punishment, compensate with time off or pay — handoff document between rotations: what happened, what to watch, what is pending — max 1 week on-call, then mandatory week off"
confidence   = 0.90
observations = 30000

