## GIT MASTERY — What Separates Juniors From Seniors

[[entries]]
situation    = "git history is a mess and needs to be cleaned before merging"
approach     = "interactive rebase onto the target branch — squash WIP commits into logical units — each commit should compile and pass tests independently — write commit messages that explain WHY not WHAT — the diff shows what changed, the message explains the reasoning — force push only to your own branch, never to shared branches"
confidence   = 0.92
observations = 100000

[[entries]]
situation    = "merge conflict that is hard to resolve"
approach     = "git merge --abort, understand both sides first — use git log --merge to see conflicting commits — resolve file by file, not all at once — after resolving, run tests before committing — if the conflict is in generated files (lock files, compiled output), regenerate instead of manually merging"
confidence   = 0.90
observations = 80000

[[entries]]
situation    = "need to undo a commit that is already pushed"
approach     = "git revert for public branches (creates a new commit that undoes the change) — never git reset --hard on shared branches — if the commit contains secrets, the secret is already compromised, rotate it — revert preserves history, reset destroys it — history destruction on shared branches breaks every collaborator"
confidence   = 0.94
observations = 50000

## SYSTEM DESIGN — How to Think at Scale

[[entries]]
situation    = "designing a system that needs to handle millions of requests"
approach     = "start with the math: requests per second = daily users × actions per user / 86,400 — identify the bottleneck (CPU, I/O, network, database) — solve the bottleneck first — horizontal scaling for stateless services, vertical scaling for databases initially — cache everything that is read more than written — CDN for static content, Redis for dynamic content — database sharding only after you have exhausted indexing, read replicas, and query optimization"
confidence   = 0.91
observations = 30000

[[entries]]
situation    = "designing a real-time system (chat, notifications, live updates)"
approach     = "WebSocket for persistent bidirectional — Server-Sent Events for server-to-client only — polling is acceptable for <10 second freshness requirements — message ordering: use sequence numbers, not timestamps — handle reconnection gracefully (client stores last received sequence, requests delta) — fan-out: one write → many reads, optimize for reads"
confidence   = 0.88
observations = 20000

[[entries]]
situation    = "designing an API that other developers will use"
approach     = "RESTful resources (nouns not verbs) — consistent naming: plural nouns, lowercase, hyphens — versioning from day 1 (/v1/) — pagination on all list endpoints (cursor-based for large datasets) — rate limiting with clear headers (X-RateLimit-Remaining) — error responses: HTTP status + error code + human message + documentation link — OpenAPI spec before implementation, not after"
confidence   = 0.92
observations = 40000

[[entries]]
situation    = "system design interview or architecture review"
approach     = "requirements first: functional (what it does) and non-functional (scale, latency, availability) — back-of-envelope math (how many users, how much data, how many requests) — high-level design (boxes and arrows) — deep dive into one component — trade-offs explicitly stated (consistency vs availability, cost vs performance) — never design for requirements you were not given"
confidence   = 0.90
observations = 50000

## DEBUGGING AT SENIOR LEVEL

[[entries]]
situation    = "production bug that cannot be reproduced locally"
approach     = "add structured logging at the entry point, decision points, and exit points of the suspected code path — deploy the logging, wait for the bug to recur — the logs will show the exact state that triggers the bug — never add console.log, use structured logging with correlation IDs — reproduce locally with the exact input from the logs"
confidence   = 0.91
observations = 40000

[[entries]]
situation    = "memory leak in a long-running service"
approach     = "heap snapshot before and after the suspected operation — compare snapshots: what grew? — common causes: event listener accumulation, cache without eviction, closure capturing outer scope, circular references — for Node.js: --inspect + Chrome DevTools — for Rust: valgrind or DHAT — for Go: pprof — the leak is always in the code that runs repeatedly, never in startup code"
confidence   = 0.89
observations = 25000

[[entries]]
situation    = "performance regression after a deploy"
approach     = "bisect the deploy: which commit introduced the regression? — git bisect automates this — compare APM metrics (latency, throughput, error rate) before and after — check: new N+1 queries, missing indexes on new columns, unoptimized serialization, synchronous calls that should be async — the most common cause is a new database query without an index"
confidence   = 0.90
observations = 30000

[[entries]]
situation    = "race condition or intermittent test failure"
approach     = "run the test 100 times in a loop — if it fails even once, the race condition is real — add sleep(100ms) at the suspected race point to make it fail consistently — the fix is always: explicit synchronization (mutex, channel, atomic), never sleep — if the test depends on timing, it is testing the scheduler not your code — mock time, do not sleep"
confidence   = 0.88
observations = 20000

## CODE QUALITY — What Makes Code Last

[[entries]]
situation    = "writing code that someone else will maintain"
approach     = "name things by what they DO not what they ARE — functions should be verbs, types should be nouns — if a function needs a comment to explain what it does, the name is wrong — max 3 parameters per function, use an options object for more — max 20 lines per function as a guideline, not a rule — the next person to read this code will be you in 6 months, and you will have forgotten everything"
confidence   = 0.91
observations = 100000

[[entries]]
situation    = "code review: what to look for and how to give feedback"
approach     = "correctness first (does it work?), then clarity (can I understand it?), then performance (is it fast enough?) — never nitpick style if you have a formatter — ask questions instead of making demands ('what happens if X is null?' not 'add a null check') — approve with comments for minor issues — block only for correctness or security — review within 24 hours, stale PRs kill velocity"
confidence   = 0.92
observations = 80000

[[entries]]
situation    = "choosing between writing tests or shipping faster"
approach     = "test the behavior, not the implementation — if the code handles money, health, or security: tests are non-negotiable — for everything else: test the happy path and the most likely failure mode — one integration test catches more real bugs than ten unit tests — no test is better than a test that never fails and gives false confidence"
confidence   = 0.89
observations = 60000

