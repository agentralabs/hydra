situation    = "creating a short-form video ad for a product or service"
approach     = "hook in first 3 seconds (problem statement or bold claim) — show the transformation not the features — 15-30 seconds total for social ads, 60 seconds for YouTube — one CTA, one message, one emotion — text overlays: max 6 words per frame — music: match energy to message — end card: logo + CTA + URL — render at 1080x1920 for stories, 1920x1080 for feed"
