[[entries]]
situation    = "scripting a product demo or walkthrough video"
approach     = "start with the outcome not the setup — show the result in first 10 seconds — then: problem → solution in action → key features (max 3) → social proof (testimonial or metric) → CTA — record real usage, not scripted clicks — narrate conversationally, not formally — under 3 minutes for demos, under 90 seconds for social"
confidence   = 0.87
observations = 25000

[[entries]]
situation    = "choosing between video formats for different platforms"
approach     = "TikTok/Reels/Shorts: vertical 9:16, under 60s, native audio — YouTube: horizontal 16:9, 8-15 min for search, under 60s for Shorts — LinkedIn: square 1:1 or horizontal, professional tone, subtitles mandatory — Twitter/X: horizontal or square, under 140s, autoplay without sound — always add captions: 85% of social video is watched muted"
confidence   = 0.91
observations = 50000

[[entries]]
situation    = "using Remotion to programmatically generate videos"
approach     = "define composition as React component — use Spring animations for smooth motion — interpolate values for text reveal, scale, position — render at 30fps for web, 60fps for premium — use registerRoot in src/Root.tsx — preview with npx remotion preview — render with npx remotion render — output MP4 for universal compatibility — bundle size matters: keep dependencies minimal"
confidence   = 0.85
observations = 15000

[[entries]]
situation    = "creating a brand intro or logo animation"
approach     = "under 5 seconds — simple is memorable — fade in or scale up (not both) — one motion per element — brand colors only — subtle sound effect at logo reveal — no text except brand name — leave 0.5s pause after animation settles — export with transparent background for overlay use"
confidence   = 0.89
observations = 20000

[[entries]]
situation    = "editing raw video footage into polished content"
approach     = "cut all silence and filler ('um', 'uh', pauses) — first cut: remove obvious bad takes — second cut: tighten every transition — add b-roll over talking head sections longer than 10s — color grade: slight contrast boost, warm tones for friendly, cool for professional — audio: normalize levels, reduce background noise, add subtle music at 15% volume — export: H.264, bitrate 8-12 Mbps for 1080p"
confidence   = 0.88
observations = 35000

[[entries]]
situation    = "creating thumbnail or preview image for a video"
approach     = "face with emotion outperforms graphics — text: 3-5 words max, high contrast — bright colors with dark outlines — avoid red/yellow YouTube-style unless that is your brand — test 3 thumbnails, measure CTR after 48 hours — mobile-first: readable at 160x90 pixels — never use the auto-generated thumbnail"
confidence   = 0.87
observations = 45000

[[entries]]
situation    = "repurposing long-form content into short-form video clips"
approach     = "watch the long form and mark 5-10 standalone moments — each clip must have its own hook and conclusion — add context text overlay if clip starts mid-topic — re-frame from horizontal to vertical by cropping to speaker — add captions always — optimal lengths: 30s, 60s, 90s — post the best clip first, save good ones for later — link back to full version"
confidence   = 0.86
observations = 30000

[[entries]]
situation    = "planning a content production pipeline for consistent output"
approach     = "batch filming: record 4-8 videos in one session — template your intro/outro in Remotion (render once, reuse) — build a component library: lower thirds, transitions, CTAs — schedule: film Monday, edit Tuesday-Wednesday, publish Thursday-Friday — maintain a 2-week content buffer — track what performs: double down on formats that work"
