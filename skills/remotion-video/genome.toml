[[entries]]
situation    = "building a social media carousel (multi-slide post)"
approach     = "slide 1: bold hook statement (stop the scroll) — slides 2-6: one point per slide, large text, minimal graphics — final slide: CTA + handle — consistent color palette across slides — each slide must make sense standalone AND in sequence — use contrast: dark text on light or light text on dark — max 10 slides, sweet spot is 5-7"
