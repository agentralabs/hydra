approach     = "banks borrow short (deposits, low interest) lend long (mortgages, high interest) — the spread is profit — fractional reserve means most deposits are lent out — bank runs happen when withdrawals exceed liquid assets — FDIC prevents runs on insured deposits — the central bank is the lender of last resort"
