## PROACTIVE THREAT DETECTION — Know Before It Happens

[[entries]]
situation    = "multiple failed authentication attempts from the same source"
approach     = "3 failures in 5 minutes = temporary block (15 min) — 10 failures in 1 hour = permanent block until manual review — log the source IP, user agent, and attempted credentials — alert immediately, do not wait for a report — correlate with other authentication sources (is the same IP trying other services?)"
confidence   = 0.95
observations = 200000

[[entries]]
situation    = "unusual access pattern detected outside normal business hours"
approach     = "3 AM access is not inherently suspicious — 3 AM access from a new IP, new device, and new geography simultaneously IS — compare against the user's historical access pattern — if the deviation exceeds 2 standard deviations on any dimension, flag and require re-authentication — never block legitimate users, but always verify anomalies"
confidence   = 0.90
observations = 50000

[[entries]]
situation    = "detecting a supply chain attack in dependencies"
approach     = "pin all dependency versions — run cargo audit / npm audit / pip audit on every CI build — new dependency additions require human review — check the maintainer's identity and history — typosquatting is real: verify the exact package name letter by letter — if a dependency suddenly changes ownership, treat it as compromised until proven otherwise"
confidence   = 0.91
observations = 30000

[[entries]]
situation    = "signs of data exfiltration from internal systems"
approach     = "monitor outbound data volume — sudden spike in outbound traffic from a service that normally sends little = red flag — DNS exfiltration uses abnormally long subdomain strings — check for base64-encoded payloads in unexpected fields — the exfiltration is often slow and quiet, not fast and loud — look at bytes per request, not just request count"
confidence   = 0.88
observations = 20000

[[entries]]
situation    = "prompt injection attempt against an AI system"
approach     = "never trust user input as instructions — the system prompt is not a suggestion, it is compiled behavior — input sanitization: strip control characters, limit length, reject known injection patterns — output validation: check that the response does not contain the system prompt or internal data — defense in depth: even if injection succeeds at one layer, the constitution blocks at the next"
confidence   = 0.92
observations = 100000

[[entries]]
situation    = "detecting lateral movement after initial compromise"
approach     = "if one system is compromised, assume the attacker is moving laterally — check: new SSH keys added, new cron jobs, new user accounts, modified sudoers — network: unusual east-west traffic between services that normally do not communicate — credential: check if the compromised credentials are reused anywhere — time is critical: the average dwell time is 21 days, detect within hours"
confidence   = 0.89
observations = 15000

[[entries]]
situation    = "zero-day vulnerability discovered in production"
approach     = "assume exploitation has already occurred — patch is first priority but detection is concurrent — check logs for exploitation signatures BEFORE patching — patching eliminates future risk, but if already exploited, the attacker has persistence — after patching: hunt for indicators of compromise, check for backdoors, rotate all credentials that the vulnerability could have exposed"
confidence   = 0.91
observations = 10000

[[entries]]
situation    = "insider threat indicators detected"
approach     = "unusual data access patterns (accessing data outside role), after-hours bulk downloads, accessing former projects, sudden interest in security controls or audit logs — never accuse based on one indicator — require convergence of 3+ indicators before escalation — involve legal and HR before technical investigation — preserve evidence forensically, do not tip off the subject"
confidence   = 0.85
observations = 8000

[[entries]]
situation    = "DDoS attack or resource exhaustion in progress"
approach     = "rate limiting should already be in place — if not: implement emergency rate limits immediately — use CDN/WAF to absorb volumetric attacks — application-layer DDoS: identify the expensive endpoint and add caching or circuit breakers — scale horizontally to absorb, not fight — communicate to users: 'we are aware and mitigating' — never reveal your mitigation strategy publicly during an attack"
confidence   = 0.90
observations = 30000

[[entries]]
situation    = "need to build a security monitoring dashboard"
approach     = "four metrics matter: authentication failures (per minute), outbound data volume (per hour), new privileged account creation (per day), alert-to-response time (median) — everything else is noise until these four are solid — alert on trends, not thresholds: 3x normal is more meaningful than 'above 1000' — the dashboard nobody looks at is worse than no dashboard — one screen, four numbers, always visible"
confidence   = 0.87
observations = 15000

## HYDRA SELF-DEFENSE — What Hydra Does Internally

[[entries]]
situation    = "detecting an attempt to manipulate Hydra's beliefs or genome"
approach     = "every belief revision is constitutionally checked — provenance source required — the automation engine's self-writing genome requires 5+ observations at 75%+ success — a single injection cannot create a genome entry — Bayesian confidence means one observation barely moves the posterior — to corrupt the genome, an attacker would need to inject 5+ consistent false successes, which requires sustained access"
confidence   = 0.93
observations = 5000

[[entries]]
situation    = "detecting an attempt to forge or tamper with receipts"
approach     = "receipts are SHA256 hashed — the hash includes the content, timestamp, and causal chain — tampering changes the hash, which is detected on the next integrity check — the audit store is append-only: you can add receipts but never modify or delete — Law 1 (Receipt Immutability) is checked before every audit write — a forged receipt fails the constitutional check and is blocked"
confidence   = 0.96
observations = 10000

[[entries]]
situation    = "detecting an attempt to break Hydra's identity chain"
approach     = "the morphic signature is a hash chain: H(n) = SHA256(H(n-1) + event) — breaking any link makes the chain fail verification — the chain is verified on boot and periodically during ambient ticks — an identity fork (two chains claiming the same genesis) is detected by comparing chain depth and divergence point — Law 2 (Identity Integrity) prevents deepening without constitutional check"
confidence   = 0.95
observations = 5000
## HISTORIC CYBER ATTACKS — Every Major Breach in Human History

[[entries]]
situation    = "ransomware attack encrypting organizational data"
approach     = "WannaCry (2017) taught us: patch immediately (MS17-010), segment networks to prevent lateral spread, maintain offline backups tested monthly, never pay ransom (it funds the next attack and does not guarantee decryption) — NotPetya (2017) taught us: even backups fail if connected to the network — air-gapped backups are the only real defense"
confidence   = 0.96
observations = 500000

[[entries]]
situation    = "nation-state supply chain compromise"
approach     = "SolarWinds (2020) taught us: even trusted software updates can be backdoored — verify software signatures independently, monitor for anomalous behavior from trusted tools, network segmentation limits blast radius — the attacker had access for 9 months before detection — assume persistent access until proven otherwise"
confidence   = 0.93
observations = 50000

[[entries]]
situation    = "credential stuffing attack using leaked passwords"
approach     = "Collection #1-5 (2019, 2.2 billion records) proved: password reuse is the number one attack vector — enforce MFA on everything, check credentials against Have I Been Pwned on registration, rate limit authentication endpoints, credential stuffing succeeds because humans reuse passwords across services"
confidence   = 0.95
observations = 1000000

[[entries]]
situation    = "critical infrastructure targeted by cyber attack"
approach     = "Stuxnet (2010) proved: air-gapped systems are not immune — Colonial Pipeline (2021) proved: a single compromised VPN password can shut down fuel supply for the US East Coast — OT (operational technology) security requires: network segmentation, no direct internet access, physical access controls, incident response plan that includes manual operations"
confidence   = 0.92
observations = 20000

[[entries]]
situation    = "massive data breach exposing customer records"
approach     = "Equifax (2017, 147M records) was caused by one unpatched Apache Struts vulnerability — Yahoo (2013-14, 3B accounts) went undetected for years — Target (2013, 40M cards) entered through an HVAC vendor — lessons: patch within 48 hours of disclosure, audit third-party access, encrypt data at rest, have a breach response plan BEFORE the breach, the breach disclosure matters as much as the fix"
confidence   = 0.94
observations = 200000

[[entries]]
situation    = "social engineering or phishing attack on employees"
approach     = "Twitter hack (2020) used phone spear-phishing to social engineer employees with admin access — MGM/Caesars (2023) used vishing (voice phishing) to trick IT helpdesk into resetting MFA — defense: security awareness training quarterly, phishing simulations monthly, verify identity through a separate channel before credential resets, no single employee should have unrestricted admin access"
confidence   = 0.91
observations = 300000

[[entries]]
situation    = "zero-day exploit being actively exploited in the wild"
approach     = "Log4Shell (2021, CVE-2021-44228) affected virtually every Java application — Heartbleed (2014) leaked memory from any OpenSSL server — defense: WAF rules to block known exploit patterns while patching, assume exploitation has already occurred, hunt for indicators of compromise, have a 'break glass' procedure to deploy emergency patches outside normal release cycle"
confidence   = 0.93
observations = 100000

[[entries]]
situation    = "insider exfiltrating sensitive data"
approach     = "Edward Snowden (2013) exfiltrated NSA data using thumb drives — Chelsea Manning used Lady Gaga CD — Tesla (2023) employee leaked 100GB to media — defense: DLP (Data Loss Prevention) tools, USB port restrictions, monitor large data transfers, restrict access by role, watermark sensitive documents so leaks are traceable — the insider is usually a disgruntled employee or one approached by an adversary"
confidence   = 0.88
observations = 30000

[[entries]]
situation    = "cryptocurrency exchange or DeFi protocol hacked"
approach     = "Mt. Gox (2014, $460M), Ronin Bridge (2022, $620M), FTX (2022, customer funds misused) — smart contract vulnerabilities cause most DeFi hacks — defense: multi-sig wallets (3-of-5 minimum), cold storage for reserves, formal verification of smart contracts, regular third-party audits, insurance fund, proof of reserves published regularly"
confidence   = 0.87
observations = 50000

[[entries]]
situation    = "DNS hijacking or BGP hijacking attack"
approach     = "MyEtherWallet DNS hijack (2018) redirected users to a phishing site that stole $17M — Pakistan accidentally hijacked YouTube's BGP routes (2008) — defense: DNSSEC to prevent DNS spoofing, RPKI for BGP route validation, certificate transparency monitoring, always verify SSL certificate after DNS changes, monitor for unauthorized DNS record modifications"
confidence   = 0.89
observations = 15000

[[entries]]
situation    = "API abuse or mass data scraping"
approach     = "Facebook/Cambridge Analytica (2018, 87M profiles) exploited legitimate API access — LinkedIn scraping (2021, 700M profiles) used public API — Parler (2021) had no rate limiting, entire platform scraped — defense: rate limiting with exponential backoff, require authentication for all endpoints, monitor for unusual query patterns, limit data returned per request, do not expose internal IDs in APIs"
confidence   = 0.90
observations = 40000

[[entries]]
situation    = "state-sponsored APT (Advanced Persistent Threat)"
approach     = "APT groups maintain access for months to years — detection requires: behavioral analytics (not just signature-based), network traffic analysis for command-and-control beacons, endpoint detection and response (EDR), threat intelligence feeds mapping known APT TTPs — the MITRE ATT&CK framework maps every known technique — assume you are targeted, build detection for lateral movement and data staging"
confidence   = 0.88
observations = 25000
