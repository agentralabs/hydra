name: Hardening Compliance Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  hardening-check:
    name: Check CANONICAL_SISTER_KIT §12 Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hardening compliance check
        run: |
          chmod +x scripts/check-hardening-compliance.sh
          bash scripts/check-hardening-compliance.sh
