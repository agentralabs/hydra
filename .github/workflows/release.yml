name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p hydra-kernel -p hydra-tui

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hydra dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/hydra_tui dist/ 2>/dev/null || true
          cp -r skills dist/skills
          tar -czf hydra-${{ matrix.name }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra-${{ matrix.name }}
          path: hydra-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hydra-linux-x86_64/hydra-linux-x86_64.tar.gz
            hydra-linux-aarch64/hydra-linux-aarch64.tar.gz
            hydra-macos-x86_64/hydra-macos-x86_64.tar.gz
            hydra-macos-aarch64/hydra-macos-aarch64.tar.gz
          generate_release_notes: true
